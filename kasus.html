    <!-- Bootstrap CSS -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top bg-dark ">
        <div class="container">
            <a class="navbar-brand" href="userinterface.html">
                <i class="bi bi-globe2"></i>
                    <b>HayatLestari</b>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle fw-semibold" href="#" role="button" 
                        data-bs-toggle="dropdown" aria-expanded="false">
                            Ensiklopedia
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="Maincontentpage.html">Flora & Fauna</a></li>
                        </ul>
                    </li>
                        
                    <li class="nav-item">
                        <a class="nav-link fw-semibold">Lapor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="#">Tentang Kami</a>
                    </li>
                    <!-- User Dropdown (Nama dan Foto Profil) -->
                    <li class="nav-item dropdown d-none px-3" id="user-dropdown">
                        <a class="nav-link d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span id="navbar-user-name" class="me-2"></span>
                            <img id="navbar-user-photo" src="" alt="Profile" class="rounded-circle me-2" style="width: 30px; height: 30px;">
                            <i class="bi bi-chevron-down"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="handleLogout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section bg-danger py-5">
        <div class="container py-5">
            <div class="text-center text-white">
                <h1 class="">Pantau Kasus</h1>
                <p class="">Ikuti perkembangan kasus perlindungan flora dan fauna yang sedang kami tangani</p>
            </div>
        </div>
    </section>

    <!-- Stats Section -->
    <section class="py-5 bg-white">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-3 ">
                    <div class="stats-box">
                        <div class="stats-number" id="totalKasus">0</div>
                        <div class="text-muted">Total Kasus</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-box">
                        <div class="stats-number text-warning" id="pengajuanCount">0</div>
                        <div class="text-muted">Pengajuan</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-box">
                        <div class="stats-number text-info" id="penyelidikanCount">0</div>
                        <div class="text-muted">Penyelidikan</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-box">
                        <div class="stats-number text-success" id="selesaiCount">0</div>
                        <div class="text-muted">Selesai</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Kasus Section -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row g-4" id="casesContainer"></div>
        </div>
    </section>

    <!-- Modal -->
    <div class="modal fade" id="caseDetailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="modalTitle">Detail Kasus</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Konten akan diisi oleh JavaScript -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="vh-30 container align-items-center">
            <br><p class="text-center">Haura Agnia Ramadhani Amnun - 2404043</p><br>
        </div>
    </footer>

    
</body>
