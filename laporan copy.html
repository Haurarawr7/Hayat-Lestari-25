                <!-- Kiri -->

                    <h1 class="report-title text-success" style="font-size: 70px;"><b>
                        Pengajuan Laporan Penyelewengan
                    </b></h1>
                    <p class="report-subtitle text-dark" style="font-size: 24px;">
                        Bantu lindungi satwa dan hutan dengan melaporkan kejadian yang Anda temui
                    </p>

                </div>

                <div class="col-lg-6">
                    <div class="form-card bg-dark p-4 rounded shadow">
                        <form>
                            <div class="mb-4">
                                <label class="form-label text-white">Jenis Laporan*</label>
                                <select class="form-select">
                                    <option selected>Pilih jenis laporan</option>
                                    <option value="1">Perburuan Liar</option>
                                    <option value="2">Pembalakan Liar</option>
                                    <option value="3">Perdagangan Satwa</option>
                                    <option value="4">Lainnya</option>
                                </select>
                            </div>

                                <label class="form-label text-white">Nama Lengkap*</label>
                                <input type="text" class="form-control" placeholder="">
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-white">Deskripsi Kejadian*</label>
                                <textarea class="form-control" placeholder="" rows="4"></textarea>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label text-white">Alamat/Lokasi*</label>
                                    <input type="text" class="form-control" placeholder="">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-white">Tanggal Kejadian*</label>
                                    <input type="date" class="form-control">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-white">Upload Foto*</label>
                                <input type="file" class="form-control" accept="image/*">
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Submit</button>
                        </form>
